name : Deploy Application to EC2 Instance 

on:
  push:
    branches:
      - main



jobs:  
  deploy:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo -i 
            cd nodejs-application-deploy
            sudo git pull 
            sudo docker compose up -d --build